# The `name:` below is referenced by release.yml's workflow_run trigger — keep in sync.
name: Refresh eqlbuilds data

# Continuous extraction of the eqlbuilds.com build-planner dataset.
# eqlbuilds.com ships its data inside a content-hashed JS bundle with no API,
# so scripts/extract-eqlbuilds.mjs re-discovers the bundle and rewrites the
# committed snapshot under src/data/eqlbuilds/. This workflow runs that on a
# schedule, validates the result, and commits it when the upstream data changes.

on:
  schedule:
    # Twice weekly, Tuesdays and Thursdays 8pm ET: game patches land Tuesday
    # mornings, so the Tuesday run catches same-day data and the Thursday run
    # picks up anything eqlbuilds.com published late. GitHub cron is UTC-only,
    # so these are Wednesday/Friday 00:00 UTC — exactly 8pm EDT; during
    # standard time they fire at 7pm ET.
    - cron: "0 0 * * 3"
    - cron: "0 0 * * 5"
  workflow_dispatch:
    inputs:
      commit:
        description: "Commit refreshed data if it changed"
        type: boolean
        default: true

permissions:
  contents: write

# Shares release.yml's group so a refresh never runs concurrently with a
# release (whose push has no rebase) or with another refresh.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      # Gate on the extractor's own --check, which ignores volatile fields
      # (extraction timestamp, bundle hash) and only reports real data changes,
      # so an unchanged upstream never produces a no-op commit. Exit 10 means
      # "data changed"; any other nonzero exit is a crashed extraction and
      # fails the job instead of being mistaken for a change.
      - name: Detect upstream changes
        id: diff
        run: |
          set +e
          npm run --silent extract:eqlbuilds:check
          code=$?
          set -e
          if [ "$code" -eq 0 ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          elif [ "$code" -eq 10 ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "extract:eqlbuilds:check failed with exit $code" >&2
            exit "$code"
          fi

      - name: Extract latest eqlbuilds.com data
        if: steps.diff.outputs.changed == 'true'
        run: |
          npm run extract:eqlbuilds
          git --no-pager diff --stat -- src/data/eqlbuilds

      # Validate the freshly-extracted snapshot before it can be committed, so a
      # bad extraction never lands on main.
      - name: Typecheck
        if: steps.diff.outputs.changed == 'true'
        run: npm run typecheck

      - name: Test
        if: steps.diff.outputs.changed == 'true'
        run: npm test

      - name: Commit refreshed data
        if: steps.diff.outputs.changed == 'true' && github.event.inputs.commit != 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/eqlbuilds
          rev=$(node -e "process.stdout.write(String(require('./src/data/eqlbuilds/manifest.json').wikiRevisionId))")
          git commit -m "chore: refresh eqlbuilds.com data snapshot (wiki rev ${rev})"
          # The branch may have moved during extraction (e.g. a human push;
          # workflow pushes are serialized by the concurrency group); rebase
          # our snapshot commit onto the current tip and re-validate the
          # combined tree before pushing it.
          git pull --rebase origin "$GITHUB_REF_NAME"
          npm run typecheck && npm test
          git push
